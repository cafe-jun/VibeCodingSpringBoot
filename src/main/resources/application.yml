spring:
  application:
    name: VibeCodingSpringBoot

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vibecoding}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:c2VjcmV0LWtleS12aWJlY29kaW5nLXNwcmluZ2Jvb3QtYXBwbGljYXRpb24tc2VjcmV0LXZlcnktbG9uZw==}
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600
